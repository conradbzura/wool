name: Sync branches
description: Sync main, master, and release branches on PR merge.

on:
  pull_request_target:
    branches:
      - master
      - release
    types:
      - closed

concurrency:
  group: sync-branches-${{ github.base_ref }}
  cancel-in-progress: false

jobs:
  sync-main:
    name: Sync main
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: ./.github/actions/get-wool-labs-app-token
        id: get-wool-labs-app-token
        with:
          app-id: ${{ secrets.WOOL_LABS_APP_ID }}
          app-installation-id: ${{ secrets.WOOL_LABS_INSTALLATION_ID }}
          app-private-key: ${{ secrets.WOOL_LABS_PRIVATE_KEY }}
      - name: Create pull request
        env:
          GH_TOKEN: ${{ steps.get-wool-labs-app-token.outputs.access-token }}
          BASE_REF: ${{ github.base_ref }}
          WORKFLOW_NAME: ${{ github.workflow }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          existing=$(gh pr list --base main --head "$BASE_REF" --state open --json number --jq 'length')
          if [[ "$existing" -gt 0 ]]; then
            echo "Sync PR already exists, skipping."
            exit 0
          fi
          workflow=$(echo "$WORKFLOW_NAME" | tr '[:upper:]' '[:lower:]')
          body="Auto-generated by the [${workflow}](${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}) workflow."
          url=$(gh pr create -B main -H "$BASE_REF" --title "Sync main with ${BASE_REF}" --body "$body")
          gh pr merge $url --merge --admin

  sync-release:
    name: Sync release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.head_ref != 'release' && github.base_ref == 'master'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: ./.github/actions/get-wool-labs-app-token
        id: get-wool-labs-app-token
        with:
          app-id: ${{ secrets.WOOL_LABS_APP_ID }}
          app-installation-id: ${{ secrets.WOOL_LABS_INSTALLATION_ID }}
          app-private-key: ${{ secrets.WOOL_LABS_PRIVATE_KEY }}
      - name: Create pull request
        env:
          GH_TOKEN: ${{ steps.get-wool-labs-app-token.outputs.access-token }}
          BASE_REF: ${{ github.base_ref }}
          WORKFLOW_NAME: ${{ github.workflow }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          git fetch --unshallow
          if [[ -n $(git ls-remote --heads origin release) ]]; then
            existing=$(gh pr list --base release --head "$BASE_REF" --state open --json number --jq 'length')
            if [[ "$existing" -gt 0 ]]; then
              echo "Sync PR already exists, skipping."
              exit 0
            fi
            workflow=$(echo "$WORKFLOW_NAME" | tr '[:upper:]' '[:lower:]')
            body="Auto-generated by the [${workflow}](${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}) workflow."
            url=$(gh pr create -B release -H "$BASE_REF" --title "Sync release with ${BASE_REF}" --body "$body")
            gh pr merge $url --auto --merge
          else
            echo "Release branch not found, skipping."
          fi
